<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>レインボープランながい WebAR</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- AR.js for A-Frame -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    /* =========================================================
       Basic
    ========================================================= */
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Yu Gothic", "Meiryo", sans-serif;
      background: transparent !important;
      color: #fff;
    }

    /* =========================================================
       iOS / Android WebAR 黒画面対策
       AR.js camera video forced visible
    ========================================================= */
    video,
    video.arjs-video,
    #arjs-video,
    body > video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
      background: transparent !important;
    }

    a-scene,
    .a-canvas,
    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    /* =========================================================
       UI
    ========================================================= */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      color: #fff;
    }

    #statusBox {
      position: absolute;
      top: 16px;
      left: 16px;
      max-width: 72vw;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    #markerLabel {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #28c46b;
      color: #082615;
      font-size: 16px;
      font-weight: 800;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    #operationPanel {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 12px;
      pointer-events: auto;
    }

    #buttonRow {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    #buttonRow button {
      flex: 0 0 auto;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 74px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    #buttonRow button.active {
      background: #2dcc70;
      color: #082615;
      border-color: rgba(255,255,255,0.35);
    }

    #buttonRow button:active {
      transform: scale(0.97);
    }

    #textPanel {
      max-height: 31vh;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(0, 28, 20, 0.72);
      border: 1px solid rgba(180, 255, 224, 0.32);
      box-shadow: 0 4px 20px rgba(0,0,0,0.38);
      backdrop-filter: blur(8px);
    }

    #textHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(180, 255, 224, 0.22);
      color: #eafff5;
      font-size: 15px;
      font-weight: 900;
    }

    #textLang {
      font-size: 13px;
      opacity: 0.95;
    }

    #scrollWindow {
      position: relative;
      height: 22vh;
      overflow: hidden;
      padding: 0 18px;
    }

    #scrollContent {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 100%;
      white-space: pre-line;
      color: #fff;
      font-size: 16px;
      font-weight: 650;
      line-height: 1.95;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e9fff1, #d7f5ff);
      color: #1d6b49;
      font-weight: 900;
      text-align: center;
      padding: 20px;
      line-height: 1.7;
    }

    #loading.hide {
      display: none;
    }

    #cameraFixButton {
      position: absolute;
      top: 70px;
      right: 16px;
      z-index: 25;
      pointer-events: auto;
      border: none;
      border-radius: 12px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.88);
      color: #174d35;
      font-weight: 800;
      display: none;
    }

    /* 小さい画面対策 */
    @media (max-height: 680px) {
      #scrollWindow {
        height: 19vh;
      }

      #textPanel {
        max-height: 28vh;
      }

      #buttonRow button {
        padding: 10px 12px;
        font-size: 14px;
        min-width: 66px;
      }

      #scrollContent {
        font-size: 15px;
        line-height: 1.8;
      }
    }
  </style>
</head>

<body>

  <div id="loading">
    <div>
      🌈 レインボープラン WebAR<br>
      カメラの使用を許可してください<br>
      <span style="font-size:13px; font-weight:600;">
        Hiroマーカーを写すとキャラクターが表示されます
      </span>
    </div>
  </div>

  <div id="ui">
    <div id="statusBox">起動中...</div>
    <div id="markerLabel">Hiro marker</div>
    <button id="cameraFixButton" onclick="forceShowCameraVideo()">カメラ再表示</button>

    <div id="operationPanel">
      <div id="buttonRow">
        <button id="btn-ja" class="active" onclick="setLanguage('ja')">日本語</button>
        <button id="btn-en" onclick="setLanguage('en')">English</button>
        <button id="btn-zh" onclick="setLanguage('zh')">中文</button>
        <button id="btn-ko" onclick="setLanguage('ko')">한국어</button>
        <button id="btn-speak" onclick="speakCurrentText()">音声</button>
        <button id="btn-stop" onclick="stopSpeech()">停止</button>
      </div>

      <div id="textPanel">
        <div id="textHeader">
          <span id="textTitle">レインボープランとは</span>
          <span id="textLang">日本語</span>
        </div>

        <div id="scrollWindow">
          <div id="scrollContent"></div>
        </div>
      </div>
    </div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >

    <a-assets>
      <a-asset-item
        id="rainbowCharacter"
        src="assets/rainbow_plan_character.glb"
      ></a-asset-item>
    </a-assets>

    <!-- Hiroマーカー -->
    <a-marker preset="hiro" id="hiroMarker">

      <!-- 全体の親 -->
      <a-entity id="arRoot" position="0 0 0" rotation="0 0 0">

        <!--
          キャラクター本体

          今回の修正：
          - 透明プレートは非表示
          - キャラクターを中央へ
          - Y軸180度回転で顔をこちらに向ける
          - 少し大きく表示
        -->
        <a-entity
          id="character"
          gltf-model="#rainbowCharacter"
          position="0 0 0"
          rotation="0 0 0"
          scale="0.55 0.55 0.55"
          animation__body="property: position; dir: alternate; dur: 1800; easing: easeInOutSine; loop: true; to: 0 0.05 0"
        ></a-entity>

        <!--
          AR空間内の半透明プレートは今回は非表示です。
          説明文は画面下の固定パネルに表示します。
        -->

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    /* =========================================================
       Text data
    ========================================================= */
    const LANG_DATA = {
      ja: {
        langLabel: "日本語",
        title: "レインボープランとは",
        voiceLang: "ja-JP",
        text:
`レインボープランは、正式には「台所と農業をつなぐながい計画」と呼ばれています。

家庭の台所から出る生ごみを、ただ捨てるのではなく、地域の資源として分別して集めます。

集められた生ごみはコンポストセンターでたい肥になり、長井市の田畑へ戻されます。

そのたい肥で土が豊かになり、米や野菜が育ち、また地域の食卓へ戻ってきます。

台所、たい肥、土、農産物、そして暮らしが、ひとつの輪としてつながる。これがレインボープランの大きな特徴です。

ごみを減らすだけでなく、市民、農家、行政が一緒になって、自然と食と暮らしを未来へつなぐ取り組みです。`
      },

      en: {
        langLabel: "English",
        title: "What is the Rainbow Plan?",
        voiceLang: "en-US",
        text:
`The Rainbow Plan is a local circular project in Nagai City.

It connects everyday kitchens with local farming.

Food waste from homes is not simply thrown away. It is collected as a valuable local resource.

The collected food waste is turned into compost and returned to the fields of Nagai.

That compost enriches the soil. Rice and vegetables grown in healthy soil come back to local dining tables.

Kitchen, compost, soil, crops, and daily life are connected in one circular system.

The Rainbow Plan is not only about reducing waste. It is a community effort by citizens, farmers, and the local government to protect nature and pass on a better future.`
      },

      zh: {
        langLabel: "中文",
        title: "什么是彩虹计划？",
        voiceLang: "zh-CN",
        text:
`彩虹计划是长井市的循环型地区建设项目。

它把家庭厨房和当地农业连接起来。

家庭中产生的厨余垃圾，不是简单地丢弃，而是作为当地资源进行分类和收集。

收集到的厨余垃圾会被制成堆肥，并回到长井市的农田。

这些堆肥让土壤更加肥沃。肥沃土地上种出的米和蔬菜，又回到当地的餐桌。

厨房、堆肥、土壤、农作物和日常生活，形成了一个循环的圆环。

彩虹计划不仅是减少垃圾的活动，也是市民、农家和行政共同保护自然、把更美好未来传给下一代的努力。`
      },

      ko: {
        langLabel: "한국어",
        title: "레인보우 플랜이란?",
        voiceLang: "ko-KR",
        text:
`레인보우 플랜은 나가이시의 지역 순환 프로젝트입니다.

가정의 부엌과 지역 농업을 연결하는 계획입니다.

가정에서 나오는 음식물 쓰레기를 그냥 버리지 않고, 지역의 소중한 자원으로 분리하여 모읍니다.

모아진 음식물 쓰레기는 퇴비가 되어 나가이시의 논과 밭으로 돌아갑니다.

그 퇴비는 흙을 건강하게 만들고, 건강한 흙에서 자란 쌀과 채소는 다시 지역의 식탁으로 돌아옵니다.

부엌, 퇴비, 흙, 농작물, 그리고 생활이 하나의 순환 고리로 이어집니다.

레인보우 플랜은 쓰레기를 줄이는 활동만이 아니라, 시민, 농가, 행정이 함께 자연을 지키고 더 나은 미래를 다음 세대에 전하는 노력입니다.`
      }
    };

    /* =========================================================
       State
    ========================================================= */
    let currentLang = "ja";
    let currentUtterance = null;
    let speaking = false;

    let mouthTarget = null;
    let originalMouthScale = null;

    let scrollAnimationId = null;
    let scrollY = 0;

    const loading = document.getElementById("loading");
    const statusBox = document.getElementById("statusBox");
    const textTitle = document.getElementById("textTitle");
    const textLang = document.getElementById("textLang");
    const scrollContent = document.getElementById("scrollContent");
    const character = document.getElementById("character");
    const hiroMarker = document.getElementById("hiroMarker");

    /* =========================================================
       Startup
    ========================================================= */
    window.addEventListener("load", () => {
      setStatus("起動しました。カメラを確認中...");
      setLanguage("ja");

      setTimeout(() => {
        if (loading) loading.classList.add("hide");
      }, 1200);

      setTimeout(forceShowCameraVideo, 500);
      setTimeout(forceShowCameraVideo, 1500);
      setTimeout(forceShowCameraVideo, 3000);
    });

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(forceShowCameraVideo, 500);
      setTimeout(forceShowCameraVideo, 1500);
      setTimeout(forceShowCameraVideo, 3000);
    });

    /* =========================================================
       Marker events
    ========================================================= */
    if (hiroMarker) {
      hiroMarker.addEventListener("markerFound", () => {
        setStatus("マーカーを認識しました");
      });

      hiroMarker.addEventListener("markerLost", () => {
        setStatus("マーカーを探しています");
      });
    }

    /* =========================================================
       Language
    ========================================================= */
    function setLanguage(lang) {
      currentLang = lang;
      const data = LANG_DATA[lang];

      if (!data) return;

      if (textTitle) textTitle.textContent = data.title;
      if (textLang) textLang.textContent = data.langLabel;
      if (scrollContent) scrollContent.textContent = data.text;

      document.querySelectorAll("#buttonRow button").forEach(btn => {
        btn.classList.remove("active");
      });

      const activeButton = document.getElementById("btn-" + lang);
      if (activeButton) {
        activeButton.classList.add("active");
      }

      stopSpeech();
      startTextScroll();

      setStatus(`${data.langLabel} に切り替えました`);
    }

    /* =========================================================
       Screen text scroll
    ========================================================= */
    function startTextScroll() {
      if (!scrollContent) return;

      if (scrollAnimationId) {
        cancelAnimationFrame(scrollAnimationId);
      }

      scrollY = 100;
      scrollContent.style.top = scrollY + "%";

      function animateScroll() {
        scrollY -= 0.035;
        scrollContent.style.top = scrollY + "%";

        const rect = scrollContent.getBoundingClientRect();
        const parentRect = scrollContent.parentElement.getBoundingClientRect();

        if (rect.bottom < parentRect.top) {
          scrollY = 100;
        }

        scrollAnimationId = requestAnimationFrame(animateScroll);
      }

      scrollAnimationId = requestAnimationFrame(animateScroll);
    }

    /* =========================================================
       Speech
    ========================================================= */
    function speakCurrentText() {
      const data = LANG_DATA[currentLang];
      if (!data) return;

      stopSpeech();

      if (!("speechSynthesis" in window)) {
        setStatus("このブラウザは音声読み上げに対応していません");
        return;
      }

      const utterance = new SpeechSynthesisUtterance(data.text);
      utterance.lang = data.voiceLang;
      utterance.rate = 0.9;
      utterance.pitch = 1.05;
      utterance.volume = 1.0;

      utterance.onstart = () => {
        speaking = true;
        setStatus("音声説明中...");
        startMouthMotion();
      };

      utterance.onend = () => {
        speaking = false;
        resetMouth();
        setStatus("音声説明が終了しました");
      };

      utterance.onerror = () => {
        speaking = false;
        resetMouth();
        setStatus("音声再生でエラーが発生しました");
      };

      currentUtterance = utterance;
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeech() {
      speaking = false;

      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }

      resetMouth();
    }

    /* =========================================================
       Mouth motion
    ========================================================= */
    if (character) {
      character.addEventListener("model-loaded", () => {
        setStatus("モデル読込完了：口パク対象を確認中");

        const object3D = character.getObject3D("mesh");

        if (!object3D) {
          setStatus("モデル読込完了：ただしmesh取得なし");
          return;
        }

        object3D.traverse((obj) => {
          const name = (obj.name || "").toLowerCase();

          const nameLooksLikeMouth =
            name.includes("mouth") ||
            name.includes("jaw") ||
            name.includes("kuchi") ||
            name.includes("口") ||
            name.includes("viseme");

          if (nameLooksLikeMouth && !mouthTarget) {
            mouthTarget = obj;
            originalMouthScale = obj.scale.clone();
            console.log("[MOUTH] mouth target found:", obj.name);
          }

          if (
            obj.morphTargetInfluences &&
            obj.morphTargetInfluences.length > 0 &&
            !mouthTarget
          ) {
            mouthTarget = obj;
            originalMouthScale = obj.scale.clone();
            console.log("[MOUTH] morph target found:", obj.name);
          }
        });

        if (mouthTarget) {
          setStatus("モデル読込完了：口パク対象あり");
        } else {
          setStatus("モデル読込完了：簡易口パクを使用");
        }
      });

      character.addEventListener("model-error", () => {
        setStatus("モデル読込エラー：GLBパスを確認してください");
      });
    }

    function startMouthMotion() {
      let t = 0;

      function animate() {
        if (!speaking) return;

        t += 0.18;

        const open = (Math.sin(t * 4.0) + 1) / 2;
        const smallOpen = 1 + open * 0.22;

        if (mouthTarget) {
          if (
            mouthTarget.morphTargetInfluences &&
            mouthTarget.morphTargetInfluences.length > 0
          ) {
            mouthTarget.morphTargetInfluences[0] = open;
          } else if (originalMouthScale) {
            mouthTarget.scale.y = originalMouthScale.y * smallOpen;
          }
        }

        /*
          口パーツが見つからない場合でも、
          キャラクター全体を軽くうなずかせて
          話している感じを出します。
        */
        const nod = Math.sin(t * 1.2) * 2.5;
        if (character) {
          character.setAttribute("rotation", `${nod} 180 0`);
        }

        requestAnimationFrame(animate);
      }

      animate();
    }

    function resetMouth() {
      if (mouthTarget && originalMouthScale) {
        if (
          mouthTarget.morphTargetInfluences &&
          mouthTarget.morphTargetInfluences.length > 0
        ) {
          mouthTarget.morphTargetInfluences[0] = 0;
        } else {
          mouthTarget.scale.copy(originalMouthScale);
        }
      }

      if (character) {
        character.setAttribute("rotation", "0 180 0");
      }
    }

    /* =========================================================
       iOS audio unlock
    ========================================================= */
    document.body.addEventListener(
      "click",
      () => {
        if ("speechSynthesis" in window) {
          const dummy = new SpeechSynthesisUtterance("");
          window.speechSynthesis.speak(dummy);
          window.speechSynthesis.cancel();
        }

        forceShowCameraVideo();
      },
      { once: false }
    );

    /* =========================================================
       Camera black screen fix
    ========================================================= */
    function forceShowCameraVideo() {
      const videos = Array.from(document.querySelectorAll("video"));

      if (videos.length === 0) {
        console.log("[CAMERA_FIX] video not found yet");
        setStatus("カメラ映像を確認中...");
        return;
      }

      videos.forEach((video, index) => {
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.setAttribute("muted", "");
        video.setAttribute("autoplay", "");

        video.style.position = "fixed";
        video.style.top = "0";
        video.style.left = "0";
        video.style.width = "100vw";
        video.style.height = "100vh";
        video.style.objectFit = "cover";
        video.style.zIndex = "0";
        video.style.display = "block";
        video.style.opacity = "1";
        video.style.visibility = "visible";
        video.style.background = "transparent";

        console.log("[CAMERA_FIX] video forced visible", {
          index,
          videoWidth: video.videoWidth,
          videoHeight: video.videoHeight,
          readyState: video.readyState,
          paused: video.paused,
          display: video.style.display,
          visibility: video.style.visibility,
          opacity: video.style.opacity
        });

        if (video.paused) {
          video.play().catch(err => {
            console.warn("[CAMERA_FIX] video play failed", err);
          });
        }
      });

      const canvases = Array.from(document.querySelectorAll("canvas"));
      canvases.forEach((canvas, index) => {
        canvas.style.position = "fixed";
        canvas.style.top = "0";
        canvas.style.left = "0";
        canvas.style.width = "100vw";
        canvas.style.height = "100vh";
        canvas.style.zIndex = "1";
        canvas.style.background = "transparent";
        console.log("[CAMERA_FIX] canvas adjusted", index);
      });

      const scene = document.querySelector("a-scene");
      if (scene) {
        scene.style.background = "transparent";
        scene.style.zIndex = "1";
      }

      const v = videos[0];
      if (v && v.videoWidth > 0 && v.videoHeight > 0) {
        setStatus("カメラ映像表示中");
      }
    }

    window.addEventListener("resize", () => {
      setTimeout(forceShowCameraVideo, 300);
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(forceShowCameraVideo, 500);
      setTimeout(forceShowCameraVideo, 1500);
    });

    /* =========================================================
       Status helper
    ========================================================= */
    function setStatus(message) {
      if (statusBox) {
        statusBox.textContent = message;
      }
      console.log("[STATUS]", message);
    }
  </script>
</body>
</html>
